# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.40"

package:
  name: graphifyy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphifyy/graphifyy-${{ version }}.tar.gz
  sha256: 29929283a07b687a4a7f84fac0e38fcfa11cbe46b3adde2bfccf6a9cb61413e1

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - graphify = graphify.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
  run:
    - python >=${{ python_min }}
    - networkx >=3.4
    - numpy >=1.21
    - rapidfuzz >=3.0
    - tree_sitter >=0.23.0
    - tree-sitter-python >=0.23
    - tree-sitter-javascript >=0.23
    - tree-sitter-typescript >=0.23
    - tree-sitter-go >=0.23
    - tree-sitter-rust >=0.23
    - tree-sitter-java >=0.23
    - tree-sitter-groovy >=0.1
    - tree-sitter-c >=0.23
    - tree-sitter-cpp >=0.23
    - tree-sitter-ruby >=0.23
    - tree-sitter-c-sharp >=0.23
    - tree-sitter-kotlin >=1.0
    - tree-sitter-scala >=0.23
    - tree-sitter-php >=0.23
    - tree-sitter-swift >=0.7
    - tree-sitter-lua >=0.2
    - tree-sitter-zig >=1.0
    - tree-sitter-powershell >=0.26
    - tree-sitter-elixir >=0.3
    - tree-sitter-objc >=3.0
    - tree-sitter-julia >=0.23
    - tree-sitter-verilog >=1.0
    - tree-sitter-fortran >=0.6
    - tree-sitter-bash >=0.23
    - tree-sitter-json >=0.23
  # Optional extras per upstream's [project.optional-dependencies] —
  # listed here as soft constraints. graphifyy alone does NOT pull
  # them in; when the user explicitly installs e.g. `mamba install
  # graphifyy openai tiktoken`, conda guarantees compatible versions.
  # `falkordb` (falkordb extra) and `faster-whisper` (video extra)
  # are intentionally omitted — not yet on conda-forge.
  run_constrained:
    - anthropic
    - boto3
    - graspologic
    - jieba
    - markdownify
    - matplotlib
    - mcp
    - neo4j-python-driver
    - openai
    - openpyxl
    - psycopg
    - pypdf
    - python-docx
    - tiktoken
    - tree-sitter-sql >=0.3
    - watchdog
    - yt-dlp

tests:
  - python:
      imports:
        - graphify
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
  - requirements:
      run:
        - pip
    script:
      - graphify --help

about:
  summary: |
    AI coding assistant skill that turns any folder of code, docs, papers,
    images, or videos into a queryable knowledge graph.
  homepage: https://github.com/safishamsi/graphify
  repository: https://github.com/safishamsi/graphify
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
    - rxm7706
